name: Build and deploy Python app to Azure Web App - finalbackend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11 (optional build check)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (build check only)
        run: |
          cd backend_fsubmission
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F9B5227F06874F33845F79ABC002365B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_940300B055204EABAE78A54CD7DCFCD1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3EDB16231D78450EBA97D10CC7A7CEAD }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: finalbackend
          slot-name: Production
          package: backend_fsubmission